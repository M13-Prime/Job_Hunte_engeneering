# Définition des sources collectées. Une source = entrée dans une des sections.

rss:
  - id: maddyness
    name: Maddyness
    url: https://www.maddyness.com/feed/
    language: fr
  - id: novethic
    name: Novethic
    url: https://www.novethic.fr/rss.html
    language: fr
  - id: carenews
    name: Carenews
    url: https://www.carenews.com/rss.xml
    language: fr
  - id: techcrunch
    name: TechCrunch
    url: https://techcrunch.com/feed/
    language: en
  - id: greenbiz
    name: GreenBiz / Trellis
    url: https://trellis.net/feed/
    language: en
  - id: sifted
    name: Sifted
    url: https://sifted.eu/feed
    language: en
  - id: frenchweb
    name: Frenchweb
    url: https://www.frenchweb.fr/feed
    language: fr

gdelt:
  enabled: false
  queries:
    - id: csrd_fr
      query: '"CSRD" sourcelang:fre'
      timespan: 24h
      max_records: 100
    - id: chief_sustainability_officer
      query: '"Chief Sustainability Officer"'
      timespan: 24h
      max_records: 100
    - id: climate_tech_funding
      query: '"climate tech" (raises OR funding OR Series)'
      timespan: 24h
      max_records: 100

newsapi:
  enabled: false
  queries:
    - id: csrd_fr
      query: CSRD OR "rapport durabilité" OR ESG
      language: fr
      page_size: 50
    - id: ai_sustainability_en
      query: "(AI OR \"machine learning\") AND (sustainability OR climate OR ESG)"
      language: en
      page_size: 50

pappers:
  enabled: false
  watchlist: []
  # Examples (uncomment + set the real SIREN to track a company):
  # - { siren: "552120222", label: "Carbone 4" }
  # - "552120222"

france_travail:
  enabled: false
  rome_codes:
    - M1403  # Études et prospectives socio-économiques
    - M1805  # Études et développement informatique
    - M1402  # Conseil en organisation et management d'entreprise
  surge_min_count: 3
  surge_z_threshold: 1.5
  history_window_days: 30
