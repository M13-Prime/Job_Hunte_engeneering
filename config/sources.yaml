  - id: gnews_csrd_fr
    name: Google News FR - CSRD
    url: https://news.google.com/rss/search?q=%22CSRD%22+OR+%22rapport+de+durabilit%C3%A9%22&hl=fr&gl=FR&ceid=FR:fr
    language: fr
  - id: gnews_ai_sustainability_en
    name: Google News EN - AI for Sustainability
    url: https://news.google.com/rss/search?q=%22AI+for+sustainability%22+OR+%22AI+for+climate%22+hiring&hl=en&gl=US&ceid=US:en
    language: en
  - id: gnews_ai_act_en
    name: Google News EN - AI Act compliance hiring
    url: https://news.google.com/rss/search?q=%22AI+Act%22+compliance+hiring&hl=en&gl=US&ceid=US:en
    language: en

# GDELT 2.0 — multilingual veille, pas de clé requise.
# Équilibre : 2 queries AI / 2 queries ESG / 2 queries intersection.
gdelt:
  enabled: true
  queries:
    # --- AI side ---
    - id: ai_exec_appointment
      query: '"Chief AI Officer" OR "Chief Data Officer" OR "Head of AI"'
      timespan: 24h
      max_records: 100
    - id: ai_act_compliance
      query: '"AI Act" (compliance OR hiring OR "Chief AI") sourcelang:eng'
      timespan: 24h
      max_records: 100

    # --- ESG / Sustainability side ---
    - id: sustainability_exec_appointment
      query: '"Chief Sustainability Officer" OR "VP Sustainability" OR "Head of ESG"'
      timespan: 24h
      max_records: 100
    - id: csrd_publication
      query: '"CSRD" OR "rapport durabilité" sourcelang:fre'
      timespan: 24h
      max_records: 100

    # --- Intersection AI x Sustainability ---
    - id: ai_for_climate_funding
      query: '("AI for climate" OR "AI for sustainability" OR "climate AI") (raises OR funding OR Series)'
      timespan: 24h
      max_records: 100
    - id: climate_tech_funding
      query: '"climate tech" (raises OR funding OR "Series A" OR "Series B")'
      timespan: 24h
      max_records: 100

newsapi:
  # Active en mettant NEWSAPI_KEY dans .env (free tier 100 req/jour).
  enabled: false
  queries:
    - id: csrd_fr
      query: CSRD OR "rapport durabilité" OR ESG
      language: fr
      page_size: 50
    - id: ai_sustainability_en
      query: "(AI OR \"machine learning\") AND (sustainability OR climate OR ESG)"
      language: en
      page_size: 50
    - id: chief_ai_officer
      query: "\"Chief AI Officer\" OR \"Head of AI\""
      language: en
      page_size: 50

pappers:
  enabled: false
  watchlist: []

france_travail:
  enabled: false
  rome_codes:
    - M1403
    - M1805
    - M1402
    - M1810
  surge_min_count: 3
  surge_z_threshold: 1.5
  history_window_days: 30
