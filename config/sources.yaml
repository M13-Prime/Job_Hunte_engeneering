# GDELT 2.0 — multilingual veille, pas de clé requise. Activé pour
# multiplier la couverture sur les signaux executive_change / funding /
# CSRD / regulatory à l'échelle mondiale (3-4 queries par run).
gdelt:
  enabled: true
  queries:
    - id: ai_exec_appointment
      query: '"Chief AI Officer" OR "Chief Data Officer" OR "Head of AI"'
      timespan: 24h
      max_records: 100
    - id: sustainability_exec_appointment
      query: '"Chief Sustainability Officer" OR "VP Sustainability" OR "Head of ESG"'
      timespan: 24h
      max_records: 100
    - id: climate_tech_funding
      query: '"climate tech" (raises OR funding OR "Series A" OR "Series B")'
      timespan: 24h
      max_records: 100
    - id: csrd_publication
      query: '"CSRD" OR "rapport durabilité" sourcelang:fre'
      timespan: 24h
      max_records: 100
    - id: ai_act_compliance
      query: '"AI Act" (compliance OR hiring OR "Chief AI") sourcelang:eng'
      timespan: 24h
      max_records: 100

newsapi:
  # Active en mettant NEWSAPI_KEY dans .env (free tier 100 req/jour).
  enabled: false
  queries:
    - id: csrd_fr
      query: CSRD OR "rapport durabilité" OR ESG
      language: fr
      page_size: 50
    - id: ai_sustainability_en
      query: "(AI OR \"machine learning\") AND (sustainability OR climate OR ESG)"
      language: en
      page_size: 50
    - id: chief_ai_officer
      query: "\"Chief AI Officer\" OR \"Head of AI\""
      language: en
      page_size: 50

pappers:
  # Surveillance de changements de dirigeants par SIREN.
  enabled: false
  watchlist: []
  # Exemples (uncomment + set le bon SIREN pour suivre la boîte) :
  # - { siren: "552120222", label: "Carbone 4" }
  # - { siren: "421203555", label: "Sweep" }

france_travail:
  # Détection de pics de recrutement par moyenne mobile 30j.
  enabled: false
  rome_codes:
    - M1403  # Études et prospectives socio-économiques
    - M1805  # Études et développement informatique
    - M1402  # Conseil en organisation et management d'entreprise
    - M1810  # Production et exploitation de systèmes d'information
  surge_min_count: 3
  surge_z_threshold: 1.5
  history_window_days: 30
