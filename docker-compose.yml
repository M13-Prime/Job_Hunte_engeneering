services:
  dashboard:
    build: .
    image: signal-tracker:local
    command: ["python", "scripts/dashboard.py", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - signal-data:/data
    restart: unless-stopped

  scheduler:
    image: signal-tracker:local
    depends_on:
      - dashboard
    command: ["python", "scripts/schedule.py"]
    env_file: .env
    volumes:
      - signal-data:/data
    restart: unless-stopped

volumes:
  signal-data:
